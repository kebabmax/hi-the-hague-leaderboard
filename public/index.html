<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <meta charset="UTF-8">
  <title>Leaderboard — HI The Hague</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top">
    <div class="band band-top"></div>
    <h1>Leaderboard</h1>
    <a href="/admin.html" class="admin-link">Admin</a>
  </header>

  <div class="wrap">
    <div id="teams"></div>
    <div class="hint">Auto-refreshes every 3 seconds</div>
  </div>

  <div class="band band-bottom"></div>

  <script>
    const prevPoints = {};

    async function loadTeams() {
      const res = await fetch('/api/teams');
      const teams = await res.json();

      const html = teams.map((t, i) => `
        <div class="team ${i === 0 ? 'first' : ''}">
          <div class="rank">#${i + 1}</div>
          <div class="name">${t.name}</div>
          <div class="points">${t.points}</div>
        </div>
      `).join('');

      const teamsEl = document.getElementById('teams');
      teamsEl.innerHTML = html || '<p>No teams yet. Add some on the admin page.</p>';

      const firstLoad = Object.keys(prevPoints).length === 0;
      teams.forEach((t, i) => {
        const wasChanged = !firstLoad
          && prevPoints[t.id] !== undefined
          && prevPoints[t.id] !== t.points;
        if (wasChanged) {
          teamsEl.children[i].classList.add('just-changed');
        }
        prevPoints[t.id] = t.points;
      });
    }

    loadTeams();
    setInterval(loadTeams, 3000);
  </script>
</body>
</html>
