<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <meta charset="UTF-8">
  <title>Leaderboard — HI The Hague</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top">
    <div class="band band-top"></div>
    <h1>Leaderboard</h1>
    <a href="/admin.html" class="admin-link">Admin</a>
  </header>

  <div class="wrap">
    <div class="podium" id="podium"></div>
<div class="rest" id="rest"></div>
    
  </div>

  <div class="band band-bottom"></div>

  <script>
    const prevPoints = {};

async function loadTeams() {
  const res = await fetch('/api/teams');
  const teams = await res.json();

  const podiumEl = document.getElementById('podium');
  const restEl = document.getElementById('rest');

  const top3 = teams.slice(0, 3);
  const rest = teams.slice(3);

  const medals = ['gold', 'silver', 'bronze'];
  const labels = ['1st', '2nd', '3rd'];

  podiumEl.innerHTML = top3.map((t, i) => `
    <div class="podium-slot ${medals[i]}" data-id="${t.id}">
      <div class="rank-label">${labels[i]}</div>
      <div class="name">${t.name}</div>
      <div class="points">${t.points}</div>
    </div>
  `).join('');

  restEl.innerHTML = rest.map((t, i) => `
    <div class="team" data-id="${t.id}">
      <div class="rank">#${i + 4}</div>
      <div class="name">${t.name}</div>
      <div class="points">${t.points}</div>
    </div>
  `).join('') || (rest.length === 0 ? '' : '');

  // flash animation for changed teams (works on both podium + rest)
  const firstLoad = Object.keys(prevPoints).length === 0;
  teams.forEach(t => {
    if (!firstLoad && prevPoints[t.id] !== undefined && prevPoints[t.id] !== t.points) {
      const el = document.querySelector(`[data-id="${CSS.escape(t.id)}"]`);
      if (el) el.classList.add('just-changed');
    }
    prevPoints[t.id] = t.points;
  });
}

loadTeams();
setInterval(loadTeams, 3000);
  </script>
</body>
</html>
