<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <meta charset="UTF-8">
  <title>Admin — HI The Hague</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="/" class="back-link">← Leaderboard</a>
  <div class="band band-top"></div>

  <div class="wrap">
    <h1>ADMIN</h1>

    <div class="admin-grid">
      <div class="admin-col">
        <div class="add-team">
          <input id="new-name" placeholder="New team name" />
          <button onclick="addTeam()">Add team</button>
        </div>
        <div id="teams"></div>
      </div>

      <div class="log-col">
        <h2>Logbook</h2>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script>
    const teamsEl = document.getElementById('teams');

    async function load() {
      const res = await fetch('/api/teams');
      const teams = await res.json();
      teamsEl.innerHTML = teams.map(t => `
        <div class="team">
          <span class="name"></span>
          <span class="points">${t.points}</span>
          <button data-id="${t.id}" data-action="plus">+1</button>
          <button data-id="${t.id}" data-action="minus">−1</button>
          <button class="danger" data-id="${t.id}" data-action="del">×</button>
        </div>
      `).join('');
      teams.forEach((t, i) => {
        teamsEl.children[i].querySelector('.name').textContent = t.name;
      });
    }

    teamsEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-id]');
      if (!btn) return;
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'plus' || action === 'minus') {
        await fetch(`/api/teams/${encodeURIComponent(id)}/points`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: action === 'plus' ? 1 : -1 })
        });
      } else if (action === 'del') {
        if (!confirm('Delete this team?')) return;
        await fetch(`/api/teams/${encodeURIComponent(id)}`, { method: 'DELETE' });
      }
      load();
      loadLog();
    });

    async function addTeam() {
      const input = document.getElementById('new-name');
      const name = input.value.trim();
      if (!name) return;
      await fetch('/api/teams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      input.value = '';
      load();
      loadLog();
    }

function consolidate(entries) {
  const result = [];
  for (const entry of entries) {
    const match = entry.what.match(/^(.+?) got ([+-]?\d+) points$/);
    if (!match) {
      result.push({ ...entry });
      continue;
    }
    const teamName = match[1];
    const amount = parseInt(match[2], 10);

    const last = result[result.length - 1];
    const sameSign = last && last._team === teamName
      && Math.sign(last._amount) === Math.sign(amount);

    if (sameSign) {
      last._amount += amount;
      const sign = last._amount >= 0 ? '+' : '';
      last.what = `${teamName} got ${sign}${last._amount} points`;
    } else {
      result.push({
        when: entry.when,
        what: entry.what,
        _team: teamName,
        _amount: amount
      });
    }
  }
  return result;
}

    async function loadLog() {
      const res = await fetch('/api/logs');
      const entries = consolidate(await res.json());
      const logEl = document.getElementById('log');
      if (!entries.length) {
        logEl.innerHTML = '<div class="log-entry"><div class="log-what">Nothing logged yet.</div></div>';
        return;
      }
      logEl.innerHTML = '';
      for (const entry of entries) {
        const d = new Date(entry.when);
        const now = new Date();
const isToday = d.toDateString() === now.toDateString();
const yesterday = new Date(now);
yesterday.setDate(now.getDate() - 1);
const isYesterday = d.toDateString() === yesterday.toDateString();

const hhmm = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const date = d.toLocaleDateString([], { month: 'short', day: 'numeric' });

let time;
if (isToday) time = hhmm;
else if (isYesterday) time = `Yesterday · ${hhmm}`;
else time = `${date} · ${hhmm}`;

        const row = document.createElement('div');
        row.className = 'log-entry';
        const t = document.createElement('div');
        t.className = 'log-time';
        t.textContent = time;
        const w = document.createElement('div');
        w.className = 'log-what';
        w.textContent = entry.what;
        row.appendChild(t);
        row.appendChild(w);
        logEl.appendChild(row);
      }
    }

    load();

    loadLog();
    setInterval(loadLog, 3000);
  </script>
</body>
</html>
